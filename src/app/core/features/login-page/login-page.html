<div class="login-page">
  <div class="login-card">

    <div class="card-header">
      <h1 class="brand">AllSports</h1>
      <p class="subtitle">{{ isLogin() ? 'Sign in to your account' : 'Create an account' }}</p>
    </div>

    <div class="card-body">
      @if (error()) {
        <div class="error-banner" role="alert">{{ error() }}</div>
      }

      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <lucide-icon [img]="mailIcon" [size]="16" class="field-icon"></lucide-icon>
          <input
            id="email"
            type="email"
            placeholder="you@example.com"
            autocomplete="email"
            [value]="email()"
            (input)="onEmailInput($event)"
            (keydown.enter)="submit()"
          />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <lucide-icon [img]="lockIcon" [size]="16" class="field-icon"></lucide-icon>
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="••••••••"
            [attr.autocomplete]="isLogin() ? 'current-password' : 'new-password'"
            [value]="password()"
            (input)="onPasswordInput($event)"
            (keydown.enter)="submit()"
          />
          <button
            type="button"
            class="eye-btn"
            (click)="toggleShowPassword()"
            [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
          >
            <lucide-icon [img]="showPassword() ? eyeOffIcon : eyeIcon" [size]="16"></lucide-icon>
          </button>
        </div>
      </div>

      <button
        type="button"
        class="submit-btn"
        [disabled]="loading()"
        (click)="submit()"
      >
        <lucide-icon [img]="isLogin() ? loginIcon : userPlusIcon" [size]="16"></lucide-icon>
        {{ loading() ? 'Please wait…' : (isLogin() ? 'Sign in' : 'Create account') }}
      </button>
    </div>

    <div class="card-footer">
      <span>{{ isLogin() ? "Don't have an account?" : 'Already have an account?' }}</span>
      <button type="button" class="toggle-btn" (click)="toggleMode()">
        {{ isLogin() ? 'Register' : 'Sign in' }}
      </button>
    </div>

  </div>
</div>
