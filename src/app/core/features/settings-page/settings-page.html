<div class="container">
  <h1>
    <lucide-icon [img]="settingsIcon" [size]="24" class="title-icon"></lucide-icon>
    <span>Settings</span>
  </h1>

  <div class="desktop-view table-responsive">
    <table class="data-table">
      <thead>
        <tr>
          <th>Setting</th>
          <th>Current Value</th>
          <th>Status</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="mobile-view"></div>

  <div class="no-data">
    No settings are available yet.
  </div>
</div>
